<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💛</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}

/* 🌸 Flower container */
.flowers {
  position: relative;
  width: 300px;
  height: 200px;
  margin-bottom: 30px;
}

/* 🌹 Roses */
.rose {
  position: absolute;
  width: 80px;
  animation: float 4s ease-in-out infinite;
}

.rose1 { left: 10%; top: 50%; }
.rose2 { left: 40%; top: 20%; }
.rose3 { left: 70%; top: 50%; }

/* 🤍 Lilies */
.lily {
  position: absolute;
  width: 90px;
  animation: float 5s ease-in-out infinite;
}

.lily1 { left: 25%; top: 70%; }
.lily2 { left: 60%; top: 70%; }

/* floating animation */
@keyframes float {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-10px) scale(1.05); }
}

/* ✨ Message */
p {
  max-width: 520px;
  line-height: 1.7;
  font-size: 18px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1s;
}

/* fade in */
@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="flowers">
  <img src="rose.png" class="rose rose1">
  <img src="rose.png" class="rose rose2">
  <img src="rose.png" class="rose rose3">

  <img src="lily.png" class="lily lily1">
  <img src="lily.png" class="lily lily2">
</div>

<p>
Hey Saumya, you are incredibly intelligent, and I truly believe you’re going to achieve something amazing in life.  
Please don’t be so hard on yourself...take a moment to enjoy how beautiful life is right now.  
And just so you know, I’ll always be right here with you❤️❤️❤️
</p></body>
</html>
