<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💛</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  text-align: center;
  overflow: hidden;
}

/* 🌸 Flowers container */
.flowers {
  position: relative;
  width: 320px;
  height: 220px;
  margin-bottom: 30px;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
}

/* 🌹 Roses */
.rose {
  position: absolute;
  width: 85px;
}

.rose1 { left: 5%; top: 50%; }
.rose2 { left: 35%; top: 10%; }
.rose3 { left: 70%; top: 50%; }

/* 🤍 Lilies */
.lily {
  position: absolute;
  width: 95px;
}

.lily1 { left: 20%; top: 70%; }
.lily2 { left: 60%; top: 70%; }

/* ✨ Message */
p {
  max-width: 520px;
  line-height: 1.7;
  font-size: 18px;
  opacity: 0;
  animation: fadeIn 1.5s ease forwards;
  animation-delay: 0.3s;
}

/* smooth fade */
@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="flowers">
  <img src="rose.png" class="rose rose1">
  <img src="rose.png" class="rose rose2">
  <img src="rose.png" class="rose rose3">

  <img src="lily.png" class="lily lily1">
  <img src="lily.png" class="lily lily2">
</div>

<p>
Hey Saumya, you are incredibly intelligent, and I truly believe you’re going to achieve something amazing in life.  
Please don’t be so hard on yourself—take a moment to enjoy how beautiful life is right now.  
And just so you know, I’ll always be right here with you. 💛
</p>

</body>
</html>
